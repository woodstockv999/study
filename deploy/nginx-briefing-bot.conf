# ─────────────────────────────────────────────────────────────
#  業界ブリーフィング Bot  — nginx リバースプロキシ設定（任意）
#  配置例: /etc/nginx/sites-available/briefing-bot
#  有効化:
#    ln -s /etc/nginx/sites-available/briefing-bot /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx
#
#  HTTPS（iPhone 等から安全にアクセス）には独自ドメイン + certbot を推奨:
#    apt-get install -y certbot python3-certbot-nginx
#    certbot --nginx -d your-domain.example
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;

    # 独自ドメインがあれば server_name を設定。無ければ IP 直アクセス用に _ のまま。
    server_name _;

    # Web 検索は数十秒かかるためタイムアウトを延長
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # NDJSON ストリーミング応答をリアルタイムで転送する（Safari "Load failed" 対策）
        proxy_buffering off;
    }
}
