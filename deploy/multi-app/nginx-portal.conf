# ─────────────────────────────────────────────────────────────
#  マルチアプリ用 nginx 設定（ポータル + パス振り分け）
#  1つのVPS・80番ポートで複数アプリを提供する受け皿。
#
#  配置:
#    cp deploy/multi-app/nginx-portal.conf /etc/nginx/sites-available/portal
#    ln -sf /etc/nginx/sites-available/portal /etc/nginx/sites-enabled/portal
#    rm -f /etc/nginx/sites-enabled/briefing-bot   # 旧・単体設定があれば外す
#    rm -f /etc/nginx/sites-enabled/default
#    nginx -t && systemctl reload nginx
#
#  ルーティング:
#    /            → ポータル（選択画面・静的）
#    /briefing    → 業界ブリーフィングBot (127.0.0.1:3000)
#    /<app>       → 追加アプリ（下のテンプレを複製してポート違いで増やす）
# ─────────────────────────────────────────────────────────────

# 各アプリ共通のプロキシ設定（Web検索など長時間処理に対応）
# （location 内で include して使う）

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ポータルの静的ファイル
    root /var/www/portal;
    index index.html;

    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_http_version 1.1;

    # ── アプリ①: 業界ブリーフィングBot ─────────────────────────
    # basePath=/briefing でビルドして 3000 番で起動しておくこと。
    location ^~ /briefing {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # NDJSON ストリーミング応答をリアルタイムで転送する（Safari "Load failed" 対策）
        proxy_buffering off;
    }

    # ── アプリ②以降を足すときのテンプレ（コピペして使う）─────────
    # location ^~ /myapp {
    #     proxy_pass http://127.0.0.1:3001;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_buffering off;
    # }

    # ── ポータル本体（上のどれにも当たらなければ静的配信）─────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
